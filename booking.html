<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>預約試戴</title>
    <style>
        .box { max-width: 400px; margin: 50px auto; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        input { width: 100%; margin-bottom: 15px; padding: 10px; border: 1px solid #ddd; }
        .submit-btn { width: 100%; padding: 10px; background: #e8a8c4; border: none; color: white; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h2>預約試戴服務</h2>
        <input type="text" placeholder="輸入姓名">
        <input type="text" placeholder="輸入電話">
        <button class="submit-btn" onclick="alert('預約成功！')">送出預約</button>
    </div>
</body>
</html>
