<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Contact Lenses Collection</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: #fdfaf7; color: #444; }
        header { padding: 40px; text-align: center; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .hero-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 50px; }
        .model-img { width: 100%; border-radius: 10px; object-fit: cover; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .project-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .project-card img { width: 100%; border-radius: 5px; }
        footer { text-align: center; padding: 50px; font-size: 0.9em; color: #888; }
    </style>
</head>
<body>

<header>
    <h1>Our Exclusive Collection</h1>
</header>

<div class="container">
    <!-- 模特實戴照展示 -->
    <div class="hero-grid">
        <img src="model-1.jpg" class="model-img" alt="Model 1">
        <img src="model-2.jpg" class="model-img" alt="Model 2">
        <img src="model-3.jpg" class="model-img" alt="Model 3">
        <img src="model-4.jpg" class="model-img" alt="Model 4">
    </div>

    <!-- 核心展示區 -->
    <section>
        <h2>The Quality Focus</h2>
        <div style="display: flex; gap: 20px;">
            <img src="venus-brown-box.png" style="width: 48%; border-radius: 10px;">
            <img src="crystal-brown-pattern.png" style="width: 48%; border-radius: 10px;">
        </div>
    </section>

    <!-- 產品清單 -->
    <h2 style="margin-top: 50px;">Available Series</h2>
    <div class="product-grid">
        <!-- 自動化生成 7 個產品卡片 -->
        <div class="project-card"><img src="project-1.png" alt="Product"></div>
        <div class="project-card"><img src="project-2.png" alt="Product"></div>
        <div class="project-card"><img src="project-3.png" alt="Product"></div>
        <div class="project-card"><img src="project-4.png" alt="Product"></div>
        <div class="project-card"><img src="project-5.png" alt="Product"></div>
        <div class="project-card"><img src="project-6.png" alt="Product"></div>
        <div class="project-card"><img src="project-7.png" alt="Product"></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Premium Lens Collection. Designed with passion.</p>
</footer>

</body>
</html>
