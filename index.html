<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <style>
        body { display: flex; font-family: sans-serif; background-color: #fdfaf7; margin: 0; }
        /* 左側選單 */
        .sidebar { width: 300px; padding: 20px; border-right: 1px solid #ddd; height: 100vh; overflow-y: auto; }
        .product-item { background: white; padding: 15px; margin-bottom: 10px; border-radius: 10px; cursor: pointer; border: 1px solid #eee; }
        
        /* 中間主要展示區 */
        .main-stage { flex-grow: 1; display: flex; align-items: center; justify-content: center; background: #fff5f5; }
        
        /* 右側資訊區 */
        .details { width: 350px; padding: 20px; border-left: 1px solid #ddd; }
        .form-box { background: white; padding: 20px; border-radius: 10px; margin-top: 20px; }
        input { width: 100%; margin-bottom: 10px; padding: 8px; }
    </style>
</head>
<body>

<aside class="sidebar">
    <h2>項目選擇</h2>
    <div class="product-item"><h3>Realish Gray</h3><p>Olens 灰色系列</p></div>
    <div class="product-item"><h3>星鑽系列</h3><p>清晰自然風</p></div>
    <div class="product-item"><h3>韓系棕色</h3><p>深邃明亮感</p></div>
    <div class="product-item"><h3>質感系列</h3><p>獨特紋理</p></div>
    <div class="product-item"><h3>柔美系列</h3><p>約會必備</p></div>
    <div class="product-item"><h3>夢幻色彩</h3><p>派對焦點</p></div>
    <div class="product-item"><h3>精品美瞳</h3><p>高級感設計</p></div>
</aside>

<main class="main-stage">
    <div style="background: white; padding: 40px; border-radius: 20px;">
        <img src="https://lensasia.tw/wp-content/uploads/2026/03/Olens_Realish_Gray_Monthly_m2-600x749.webp" width="300">
        <p>Venus Brown Lens Case</p>
    </div>
</main>

<section class="details">
    <h1>VENUS</h1>
    <p>BROWN-GLAMOUR</p>
    <div class="form-box">
        <h3>預約表單</h3>
        <input type="text" placeholder="姓名">
        <input type="text" placeholder="電話">
        <button style="width:100%; background:pink; border:none; padding:10px;">預約試戴</button>
    </div>
</section>

</body>
</html>
