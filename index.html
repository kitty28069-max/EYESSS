<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Contact Lenses Collection</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; background-color: #fdfaf7; color: #444; line-height: 1.6; }
        header { padding: 40px; text-align: center; }
        .logo-img { max-width: 200px; height: auto; margin-bottom: 20px; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .hero-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 50px; }
        .model-img { width: 100%; border-radius: 10px; object-fit: cover; aspect-ratio: 4/3; }
        .core-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; margin-bottom: 50px; }
        .core-img { width: 100%; border-radius: 10px; }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .project-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: transform 0.3s; }
        .project-card:hover { transform: translateY(-5px); }
        .project-card img { width: 100%; border-radius: 5px; }
        footer { text-align: center; padding: 50px; font-size: 0.9em; color: #888; }
    </style>
</head>
<body>

<header>
    <!-- 已修正：加入 Logo -->
    <img src="logo.png" alt="Brand Logo" class="logo-img">
    <h1>Our Exclusive Collection</h1>
</header>

<div class="container">
    <!-- 模特實戴照展示 -->
    <div class="hero-grid">
        <img src="model-1.jpg" class="model-img" alt="Model 1">
        <img src="model-2.jpg" class="model-img" alt="Model 2">
        <img src="model-3.jpg" class="model-img" alt="Model 3">
        <img src="model-4.jpg" class="model-img" alt="Model 4">
    </div>

    <!-- 核心展示區 -->
    <section>
        <h2 style="text-align: center; margin-bottom: 30px;">The Quality Focus</h2>
        <div class="core-grid">
            <img src="venus-brown-box.png" class="core-img" alt="Product Box">
            <img src="crystal-brown-pattern.png" class="core-img" alt="Pattern Detail">
        </div>
    </section>

    <!-- 產品清單 -->
    <h2 style="margin-top: 50px; text-align: center;">Available Series</h2>
    <div class="product-grid">
        <div class="project-card"><img src="project-1.png" alt="Product"></div>
        <div class="project-card"><img src="project-2.png" alt="Product"></div>
        <div class="project-card"><img src="project-3.png" alt="Product"></div>
        <div class="project-card"><img src="project-4.png" alt="Product"></div>
        <div class="project-card"><img src="project-5.png" alt="Product"></div>
        <div class="project-card"><img src="project-6.png" alt="Product"></div>
        <div class="project-card"><img src="project-7.png" alt="Product"></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 Premium Lens Collection. All Rights Reserved.</p>
</footer>

</body>
</html>
